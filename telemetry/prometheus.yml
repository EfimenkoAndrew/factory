# Prometheus v3.13.1 — AI Factory scrape topology (spine AD-5/AD-6).
# factory-exporter: the factory_* series derived from events.jsonl (the only duration
# authority is source:derived — AD-12). otel-collector:8889: span-derived
# traces_span_metrics_* (spanmetrics connector) — a distinct family, no duplication.
global:
  scrape_interval: 15s
  evaluation_interval: 30s

scrape_configs:
  - job_name: factory-exporter
    static_configs:
      - targets: ["exporter:9464"]

  - job_name: otel-collector-spanmetrics
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
